# Configuration file for starship.rs: https://starship.rs/config/
# based on https://github.com/CoryCharlton/starship-configuration
"$schema" = "https://starship.rs/config-schema.json"

command_timeout = 1500

format = """
[¯éÂ](fg:color_bg1)\
$os\
$username\
$hostname\
[¯é░](fg:color_bg1 bg:color_bg2)\
$directory\
[¯é░](fg:color_bg2 bg:color_bg3)\
$git_branch\
$git_status\
[¯é░](fg:color_bg3 bg:color_bg4)\
$c\
$docker_context\
$java\
$kotlin\
$lua\
$nodejs\
$python\
$ruby\
$rust\
$swift\
[¯é░](fg:color_bg4 bg:color_bg5)\
$cmd_duration\
[¯é┤ ](fg:color_bg5)\
$line_break\
$time\
$character\
"""

palette = "custom"

[palettes.custom]
color_bg1 = "#336699"
color_bg2 = "#2f5783"
color_bg3 = "#294262"
color_bg4 = "#232f44"
color_bg5 = "#1d2230"

color_blue = "#769ff0"
color_gray = "#999999"
color_green = "#5FA04E"
color_red = "#eb4d28"
color_white = "#f2f2f2"

[character]
error_symbol = "[¾░ìƒ](bold color_red)"
success_symbol = "[¾░ìƒ](bold color_green)"

[cmd_duration]
format = "took [$duration](bold color_gray)"
show_notifications = true
min_time = 1000

[directory]
style = "bg:color_bg2 fg:color_white"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"
truncate_to_repo = true
read_only = " ¯®Á "

[directory.substitutions]
"Dev" = "¯×ò "
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[git_branch]
symbol = "´Éÿ"
style = "bg:color_bg3 fg:color_blue"
format = "[$symbol $branch]($style)"

[git_status]
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
deleted = "´ÆÄ${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
modified = "!${count}"
renamed = "┬╗${count}"
staged = "+${count}"
stashed = "­ƒàé ${count}"
untracked = "?${count}"
up_to_date = "Ô£ö"
format = '[( $all_status$ahead_behind)]($style)'
style = "bold bg:color_bg3 fg:color_red"

[hostname]
format = "[@$hostname]($style)"
ssh_only = false
ssh_symbol = "¯¼ü "
style = "bg:color_bg1 fg:color_white"

[os]
format = "[$symbol]($style)"
style = "bg:color_bg1 fg:color_white"
disabled = false

[time]
time_format = "%H:%M"
style = "fg:color_green"
disabled = false

[username]
disabled = false
format = "[$user]($style)"
show_always = false
style_root = "bg:color_bg1 fg:color_red"
style_user = "bg:color_bg1 fg:color_white"

# Code symbols
[c]
format = '[$symbol]($style)'
style = "bg:color_bg4 fg:#6295CB"
symbol = "¯ÿ× "

[docker_context]
format ="via [$symbol $context]($style) "
symbol = "´îê"
style  =  "bg:color_bg4 fg:#5FEE4E"

[java]
format = '[$symbol ]($style)'
style = "bg:color_bg4 fg:#F7901E"
symbol = "¯ëû "

[kotlin]
format = '[$symbol ]($style)'
style = "bg:color_bg4 fg:#C017E4"
symbol = "¯ÿ┤ "

[lua]
format = '[$symbol ]($style)'
style = "bg:color_bg4 fg:#FFAC1C"
symbol = "¯ÿá "

[nodejs]
style = "bg:color_bg4 fg:#5FA04E"
format = '[$symbol($version) ]($style)'
symbol = "¯£ÿ "

[python]
style = "bg:color_bg4 fg:#3572A5"
format = '[$symbol($version) via \($virtualenv\)]($style)'
symbol = "¯ÿå "

[ruby]
style = "bg:color_bg4 fg:#CC342B"
format = '[$symbol($version) ]($style)'
symbol = "¯×æ "

[rust]
style = "bg:color_bg4 fg:#005CC5"
format = '[$symbol($version) ]($style)'
symbol = "¯Üï "

[swift]
style = "bg:color_bg4 fg:#FFAC1C"
format = '[$symbol($version) ]($style)'
symbol = "¯Ø¿ "

